---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d.%m.%Y" }}</time>
    {% if page.tags.size > 0 %}
    <span class="tags">
      {% for tag in page.tags %}
      <a href="{{ '/tagi/' | relative_url }}#{{ tag }}" class="tag tag-{{ tag }}">{{ tag }}</a>
      {% endfor %}
    </span>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="{{ '/' | relative_url }}">← Wróć na stronę główną</a>
  </footer>
</article>
